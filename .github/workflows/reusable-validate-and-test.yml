# Reusable validation gate: tests, hatch build, twine check.
# See docs/architecture/ci-cd-packaging-governance.md §3.
name: Reusable validate and test

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: "Git ref (branch, tag, or SHA) to checkout; leave empty to use the caller workflow default ref"
        type: string
        default: ""

permissions:
  contents: read

jobs:
  validate-and-test:
    name: validate-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref != '' && inputs.checkout_ref || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project (editable) and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Build distributions
        run: hatch build

      - name: Check distributions
        run: twine check dist/*
