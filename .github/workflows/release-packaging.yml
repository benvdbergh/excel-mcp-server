# Manual packaging: quality gates → build → upload inspectable wheels/sdists.
# See docs/architecture/ci-cd-packaging-governance.md §3.
name: Release packaging

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Git ref (branch, tag, or SHA) to build"
        required: true
        type: string
      artifact_retention_days:
        description: "Artifact retention (days); short default for non-production builds"
        required: false
        default: "7"
        type: string

permissions:
  contents: read

concurrency:
  group: release-packaging-${{ github.workflow }}-${{ github.event.inputs.release_ref }}
  cancel-in-progress: false

jobs:
  validate-and-test:
    name: validate-and-test
    uses: ./.github/workflows/reusable-validate-and-test.yml
    with:
      checkout_ref: ${{ github.event.inputs.release_ref }}

  # Re-build after gates so `dist/` exists on this runner (reusable job output is not caller-scoped).
  package-distributions:
    name: package-distributions
    needs: validate-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.release_ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install project and dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build distributions
        run: hatch build

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: |
            dist/*.whl
            dist/*.tar.gz
          if-no-files-found: error
          retention-days: ${{ fromJSON(github.event.inputs.artifact_retention_days || '7') }}
