# Manual trusted publish with explicit ref; validate → build → PyPI/TestPyPI.
# See docs/architecture/ci-cd-packaging-governance.md §3, §6–§7.
name: Release PyPI publish

on:
  workflow_dispatch:
    inputs:
      release_ref:
        description: >
          Git ref to checkout: branch (e.g. main), tag (this repo uses vX.Y.Z, not bare 0.1.8),
          or full commit SHA. Must exist on this repo. PyPI version strings like 0.1.8 are not refs
          unless you created a branch/tag with that exact name.
        required: true
        type: string
      pypi_target:
        description: "Registry target"
        required: true
        type: choice
        default: pypi
        options:
          - pypi
          - testpypi

permissions:
  contents: read

concurrency:
  group: release-pypi-${{ github.workflow }}-${{ github.event.inputs.release_ref }}-${{ github.event.inputs.pypi_target }}
  cancel-in-progress: false

jobs:
  validate-and-test:
    name: validate-and-test
    uses: ./.github/workflows/reusable-validate-and-test.yml
    with:
      checkout_ref: ${{ github.event.inputs.release_ref }}

  publish-to-registry:
    name: publish-to-pypi
    needs: validate-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Align names with PyPI trusted publisher + optional TestPyPI environment mapping.
    environment:
      name: ${{ github.event.inputs.pypi_target == 'testpypi' && 'testpypi' || 'release' }}
      url: ${{ github.event.inputs.pypi_target == 'testpypi' && 'https://test.pypi.org/project/excel-com-mcp' || 'https://pypi.org/project/excel-com-mcp' }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.inputs.release_ref }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install hatch
        run: |
          python -m pip install --upgrade pip
          pip install hatch

      - name: Build package
        run: hatch build

      - name: Publish to TestPyPI
        if: github.event.inputs.pypi_target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

      - name: Publish to PyPI
        if: github.event.inputs.pypi_target == 'pypi'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1