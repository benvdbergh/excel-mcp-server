# Thin PR / main gate; mirrors release quality commands per governance §3.
name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-test:
    name: validate-and-test
    uses: ./.github/workflows/reusable-validate-and-test.yml