# GitHub Release → PyPI; reuses the same validation gates as PR CI before build/publish.
# See docs/architecture/ci-cd-packaging-governance.md §3.
name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  validate-and-test:
    uses: ./.github/workflows/reusable-validate-and-test.yml
    with:
      checkout_ref: ${{ github.event.release.tag_name }}

  build-n-publish:
    name: Build and publish to PyPI
    needs: validate-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: release
      url: https://pypi.org/project/excel-mcp-server
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install hatch
        run: |
          python -m pip install --upgrade pip
          pip install hatch

      - name: Build package
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
